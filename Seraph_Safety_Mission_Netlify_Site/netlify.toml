[build]
  publish = "."
  command = ""

# Pretty URL redirects (optional)
[[redirects]]
  from = "/whitepaper"
  to = "/whitepaper/"
  status = 301

[[redirects]]
  from = "/resources"
  to = "/resources/"
  status = 301

[[redirects]]
  from = "/about"
  to = "/about/"
  status = 301

[[redirects]]
  from = "/contact"
  to = "/contact/"
  status = 301

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"
